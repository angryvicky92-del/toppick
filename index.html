<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 트렌드 여론 분석 | 인사이트 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>오늘의 핫이슈</h1>
            <p class="p-subtitle">실시간 인기 검색어 기반 커뮤니티 여론 통합 리포트</p>
        </header>

        <main id="feed" class="feed-grid">
            <!-- 트렌드 카드가 여기에 동적으로 삽입됩니다 -->
            <div class="trend-card" style="opacity: 0.5;">
                <div class="keyword">데이터 불러오는 중...</div>
                <div class="sentiment-container">
                    <div class="sentiment-bar">
                        <div class="pos" style="width: 50%;"></div>
                        <div class="neg" style="width: 50%;"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 상세 페이지 모달 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2 id="modal-title">키워드 상세 분석</h2>
            <div id="modal-summary" style="margin-top: 20px; color: var(--text-dim);"></div>
            
            <div class="source-list" id="modal-sources">
                <!-- 커뮤니티 원문 리스트가 여기에 삽입됩니다 -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
